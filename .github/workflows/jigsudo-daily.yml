name: Jigsudo Daily Lifecycle
on:
  schedule:
    - cron: "0 6 * * *" # Exactly 06:00 UTC
  workflow_dispatch:
    inputs:
      seed:
        description: "Seed/Date to generate manually (e.g., 20261231)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  maintenance:
    name: 📉 Apply Score Decay
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Install Dependencies
        run: npm ci || npm install
      - name: Run Decay Script
        env:
          FIREBASE_SERVICE_ACCOUNT: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
        run: node scripts/apply-decay.js

  generation:
    name: 🧩 Generate Daily Puzzles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Install Dependencies
        run: npm ci || npm install
      - name: Generate Missing Puzzles (Smart Buffer)
        run: node scripts/generate-daily.js ${{ github.event.inputs.seed }}
      - name: 🚀 Commit and Push
        run: |
          git config --global user.name 'Jigsudo Bot'
          git config --global user.email 'bot@jigsudo.com'
          git add public/puzzles/*.json
          git commit -m "📅 Maintenance & New Daily Puzzle [${{ github.event_name }}]" || exit 0
          git pull --rebase origin main
          git push
