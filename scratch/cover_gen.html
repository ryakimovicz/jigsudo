<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jigsudo Cover Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Lora:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0d1117;
            --bg-surface: #1e2329;
            --accent-orange: #ffa726;
            --accent-teal: #2a9d8f;
            --text-main: #cdd9e5;
            --text-muted: #768390;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 1600px;
            height: 685px;
            overflow: hidden;
            background: var(--bg-deep);
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 50% 80%, #1c232b 0%, var(--bg-deep) 70%);
            border: 1px solid rgba(255,255,255,0.05);
            box-sizing: border-box;
        }

        /* Abstract grid background */
        .grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(ellipse at center, black, transparent 80%);
            pointer-events: none;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 40px;
            z-index: 10;
        }

        .logo-svg {
            width: 280px;
            height: 280px;
            filter: drop-shadow(0 0 30px rgba(255, 167, 38, 0.2));
        }

        .text-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .brand-name {
            font-size: 160px;
            font-weight: 700;
            letter-spacing: -4px;
            line-height: 0.9;
            margin: 0;
            background: linear-gradient(to bottom, #ffffff 30%, #a0aec0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        .edition-label {
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: 48px;
            margin-top: 10px;
            color: var(--accent-orange);
            font-weight: 600;
            opacity: 0.9;
        }

        .tagline {
            position: absolute;
            bottom: 60px;
            font-size: 32px;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 400;
        }

        /* Decorative Floating Elements */
        .floating {
            position: absolute;
            pointer-events: none;
            opacity: 0.4;
            filter: blur(2px);
        }

        .p1 { top: 10%; left: 15%; transform: rotate(15deg); width: 120px; }
        .p2 { top: 70%; left: 10%; transform: rotate(-20deg); width: 150px; }
        .p3 { top: 15%; right: 12%; transform: rotate(-10deg); width: 140px; }
        .p4 { top: 75%; right: 15%; transform: rotate(25deg); width: 110px; }

        .number {
            font-size: 120px;
            color: rgba(255,255,255,0.05);
            font-weight: 700;
            position: absolute;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="container" id="capture-area">
        <div class="grid"></div>
        
        <!-- Background Numbers -->
        <div class="number" style="top: 50px; left: 100px;">4</div>
        <div class="number" style="bottom: 80px; left: 400px;">9</div>
        <div class="number" style="top: 200px; right: 200px;">7</div>
        <div class="number" style="bottom: 50px; right: 100px;">1</div>

        <!-- Floating Pieces -->
        <svg class="floating p1" viewBox="0 0 100 100"><path d="M20,20 H80 V80 H20 Z" fill="var(--accent-teal)" /></svg>
        <svg class="floating p2" viewBox="0 0 100 100"><path d="M20,50 Q20,20 50,20 T80,50 T50,80 T20,50" fill="var(--accent-orange)" /></svg>
        <svg class="floating p3" viewBox="0 0 100 100"><path d="M30,30 L70,30 L70,70 L30,70 Z" fill="var(--accent-teal)" opacity="0.6" /></svg>
        
        <div class="logo-section">
            <div class="logo-svg">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                    <line x1="170.6" y1="20" x2="170.6" y2="492" stroke="#cdd9e5" stroke-width="24" stroke-linecap="round" />
                    <line x1="341.3" y1="20" x2="341.3" y2="492" stroke="#cdd9e5" stroke-width="24" stroke-linecap="round" />
                    <line x1="20" y1="170.6" x2="492" y2="170.6" stroke="#cdd9e5" stroke-width="24" stroke-linecap="round" />
                    <line x1="20" y1="341.3" x2="492" y2="341.3" stroke="#cdd9e5" stroke-width="24" stroke-linecap="round" />
                    <text x="85.3" y="105" text-anchor="middle" dominant-baseline="middle" fill="#60a5fa" font-size="160" font-weight="700">J</text>
                    <text x="256" y="105" text-anchor="middle" dominant-baseline="middle" fill="#ffa726" font-size="160" font-weight="700">1</text>
                    <text x="426.6" y="105" text-anchor="middle" dominant-baseline="middle" fill="#ffa726" font-size="160" font-weight="700">6</text>
                    <text x="85.3" y="275" text-anchor="middle" dominant-baseline="middle" fill="#ffa726" font-size="160" font-weight="700">5</text>
                    <text x="256" y="275" text-anchor="middle" dominant-baseline="middle" fill="#60a5fa" font-size="160" font-weight="700">U</text>
                    <text x="256" y="445" text-anchor="middle" dominant-baseline="middle" fill="#60a5fa" font-size="160" font-weight="700">D</text>
                    <text x="426.6" y="445" text-anchor="middle" dominant-baseline="middle" fill="#ffa726" font-size="160" font-weight="700">0</text>
                </svg>
            </div>
            <div class="text-group">
                <h1 class="brand-name">JIGSUDO</h1>
                <div class="edition-label" id="edition-text">Basic Edition</div>
            </div>
        </div>

        <div class="tagline">One board. Six daily challenges.</div>
    </div>

    <script>
        function setMode(mode) {
            const text = document.getElementById('edition-text');
            const logo = document.querySelector('.logo-svg');
            
            if (mode === 'basic') {
                text.style.display = 'block';
                text.textContent = 'Basic Edition';
                logo.style.display = 'block';
            } else if (mode === 'nologo') {
                text.style.display = 'block';
                text.textContent = 'Basic Edition';
                logo.style.display = 'none';
            } else {
                text.style.display = 'none';
                logo.style.display = 'block';
            }
        }
        
        // Default to basic as requested
        // setMode('basic');
    </script>
</body>
</html>
